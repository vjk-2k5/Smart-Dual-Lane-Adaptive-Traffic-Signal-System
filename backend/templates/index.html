<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Adaptive Traffic Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🚦</div>
                <h1>SmartSignal <span>AI</span></h1>
            </div>
            <div class="status-badge">
                <span class="pulse"></span> System Online
            </div>
        </header>

        <main class="dashboard">
            <!-- Lane 1 Section -->
            <section class="lane-card" id="lane1-card">
                <div class="lane-header">
                    <h2>Lane 1 <span class="subtitle">Northbound</span></h2>
                    
                    <!-- Traffic Light UI -->
                    <div class="traffic-light" id="tl-l1">
                        <div class="light red"></div>
                        <div class="light yellow"></div>
                        <div class="light green"></div>
                    </div>
                </div>

                <div class="video-container">
                    <div class="video-overlay">
                        <img src="/video_feed/1" alt="Lane 1 Feed" class="video-feed" id="feed-l1" onerror="this.onerror=null; this.src='https://via.placeholder.com/640x480.png?text=Waiting+for+Stream...';">
                        <div class="scanline"></div>
                    </div>
                </div>

                <div class="telemetry-grid">
                    <div class="metric-box">
                        <span class="label">Vehicle Count</span>
                        <span class="value" id="count-l1">0</span>
                    </div>
                    <div class="metric-box">
                        <span class="label">Traffic Density</span>
                        <div class="progress-bar">
                            <div class="progress" id="density-bar-l1" style="width: 0%;"></div>
                        </div>
                        <span class="density-val" id="density-val-l1">0%</span>
                    </div>
                </div>
            </section>

            <!-- Status Indicator Panel -->
            <section class="center-panel">
                <div class="vs-badge">VS</div>
                <div class="glass-info">
                    <h3>Adaptive Engine Core</h3>
                    <p>Current Mode: <span id="mode-badge" style="color: var(--primary); font-weight: bold;">SIMULATOR</span></p>
                    
                    <div style="margin: 1rem 0;">
                        <button id="toggle-mode-btn" class="glow-btn">SWITCH TO PIXEL SIMULATOR</button>
                    </div>

                    <div class="data-stream" id="data-stream">
                        <p>Awaiting connect...</p>
                    </div>
                </div>
            </section>

            <!-- Lane 2 Section -->
            <section class="lane-card" id="lane2-card">
                <div class="lane-header">
                    <h2>Lane 2 <span class="subtitle">Eastbound</span></h2>
                    
                    <!-- Traffic Light UI -->
                    <div class="traffic-light" id="tl-l2">
                        <div class="light red"></div>
                        <div class="light yellow"></div>
                        <div class="light green"></div>
                    </div>
                </div>

                <div class="video-container">
                    <div class="video-overlay">
                        <img src="/video_feed/2" alt="Lane 2 Feed" class="video-feed" id="feed-l2" onerror="this.onerror=null; this.src='https://via.placeholder.com/640x480.png?text=Waiting+for+Stream...';">
                        <div class="scanline"></div>
                    </div>
                </div>

                <div class="telemetry-grid">
                    <div class="metric-box">
                        <span class="label">Vehicle Count</span>
                        <span class="value" id="count-l2">0</span>
                    </div>
                    <div class="metric-box">
                        <span class="label">Traffic Density</span>
                        <div class="progress-bar">
                            <div class="progress" id="density-bar-l2" style="width: 0%;"></div>
                        </div>
                        <span class="density-val" id="density-val-l2">0%</span>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
